study:
  template_model: C:/path/to/your/model.cfdst
  design_name: ''
  scenario_name: ''
automation:
  cfd_executable: C:/Program Files/Autodesk/CFD 2026/CFD.exe
  timeout_minutes: 120
  max_retries: 1
llm:
  provider: ollama
  temperature: 0.1
  max_rows: 200
  ollama:
    base_url: http://127.0.0.1:11434
    model: llama3.2:3b
    timeout_seconds: 120
  groq:
    base_url: https://api.groq.com/openai/v1
    model: llama-3.1-8b-instant
    api_key_env: GROQ_API_KEY
    timeout_seconds: 60
mesh:
  default_params:
    max_element_size_m: ''
    min_element_size_m: ''
    inflation_layers: ''
    target_y_plus: ''
    refinement_zones: []
  quality_gate:
    enabled: true
    require_all_metrics: false
    skewness_max: 0.95
    aspect_ratio_max: 100.0
    orthogonality_min: 0.1
    element_count_min: 1000
    element_count_max: 50000000
  retry:
    enabled: true
    strategy:
    - coarsen
    - refine
    coarsen_size_scale: 1.35
    refine_size_scale: 0.75
    coarsen_inflation_delta: -1
    refine_inflation_delta: 1
solve:
  enabled: false
  skip_if_results_exist: true
  scenario_overrides:
    iterations: 100
    convergenceThreshold: 0.5
outputs:
  save_all_summary: true
  screenshots:
    enabled: true
    views:
    - default
  cutplanes: []
  report:
    enabled: true
metrics:
- alias: temp_max_c
  section: field variable results summary
  quantity: temp.max
  unit: C
- alias: pressure_max_dyne_cm2
  section: field variable results summary
  quantity: press.max
  unit: dyne/cm^2
- alias: velocity_mag_max_cm_s
  section: field variable results summary
  quantity: vx vel.max
  unit: cm/s
criteria:
- alias: temp_max_c
  operator: <=
  threshold: 500.0
- alias: pressure_max_dyne_cm2
  operator: <=
  threshold: 2000.0
ranking:
- alias: temp_max_c
  goal: min
  weight: 0.7
- alias: pressure_max_dyne_cm2
  goal: min
  weight: 0.3
parameter_mappings:
- source_column: inlet_velocity_ms
  target_type: boundary_condition
  match:
    type: Normal Velocity
    entity_ids:
    - 18
  property: value
  units: m/s
- source_column: ambient_temp_c
  target_type: boundary_condition
  match:
    type: Temperature
    entity_ids:
    - 18
    - 170
  property: value
  units: Celsius
- source_column: total_heat_w
  target_type: boundary_condition
  match:
    type: Total Heat Generation
    entity_names:
    - Part1.Body24
  property: value
  units: W
- source_column: chip_heat_gen_wm3
  target_type: boundary_condition
  match:
    type: Heat Generation
  property: value
  units: W/m3
