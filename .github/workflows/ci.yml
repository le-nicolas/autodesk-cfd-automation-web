name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile
        run: |
          python -m compileall app.py cfd_automation scripts

      - name: Run tests
        env:
          CFD_AUTOMATION_DRY_RUN: "1"
        run: |
          pytest -q
